<main class="login-shell">
  <section class="login-card">
    <h1 style="color: #146348;">Jai Inspections</h1>
    <p> </p>
    <h1>Sign in</h1>
    <p> </p>
    <p class="subtitle">Use your workspace credentials to continue.</p>

    <form (ngSubmit)="submit()" #loginForm="ngForm" class="login-form">
      <label>
        Username
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          autocomplete="username"
          spellcheck="false"
          required
        />
      </label>

      <label>
        Password
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          autocomplete="current-password"
          required
        />
      </label>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="loading || !loginForm.form.valid">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </section>
</main>
